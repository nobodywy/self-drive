<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>self-drive</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <h1>self-drive</h1>
          <p>一个适合 NAS 的轻量多用户网页网盘</p>
        </div>
        <div id="userBox" class="user-box hidden">
          <span id="currentUser"></span>
          <button id="logoutBtn" class="ghost">退出</button>
        </div>
      </header>

      <main class="layout">
        <section id="authCard" class="card auth-card">
          <div class="tabs">
            <button id="loginTab" class="tab active">登录</button>
            <button id="registerTab" class="tab">注册</button>
          </div>

          <form id="authForm" class="stack">
            <label id="nameField" class="hidden">
              <span>昵称</span>
              <input id="nameInput" name="name" placeholder="例如：小杨" />
            </label>
            <label>
              <span>邮箱</span>
              <input id="emailInput" name="email" type="email" required placeholder="name@example.com" />
            </label>
            <label>
              <span>密码</span>
              <input id="passwordInput" name="password" type="password" required placeholder="至少 6 位" />
            </label>
            <button id="submitBtn" type="submit">登录</button>
          </form>
          <p id="authMessage" class="hint"></p>
        </section>

        <section id="appCard" class="hidden app-grid">
          <div class="card sidebar">
            <h2>上传文件</h2>
            <form id="uploadForm" class="stack">
              <input id="fileInput" type="file" name="files" multiple />
              <button type="submit">上传</button>
            </form>
            <p id="uploadMessage" class="hint"></p>

            <div class="stats">
              <div>
                <span class="label">文件数</span>
                <strong id="fileCount">0</strong>
              </div>
              <div>
                <span class="label">总大小</span>
                <strong id="totalSize">0 B</strong>
              </div>
            </div>
          </div>

          <div class="card content">
            <div class="section-head">
              <h2>我的文件</h2>
              <button id="refreshBtn" class="ghost">刷新</button>
            </div>
            <div id="emptyState" class="empty">还没有文件，先上传一个试试。</div>
            <table id="fileTable" class="hidden">
              <thead>
                <tr>
                  <th>文件名</th>
                  <th>大小</th>
                  <th>类型</th>
                  <th>上传时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="fileTableBody"></tbody>
            </table>
          </div>

          <div class="card preview">
            <div class="section-head">
              <h2>预览</h2>
              <span id="previewTitle" class="hint">未选择文件</span>
            </div>
            <div id="previewContainer" class="preview-container muted">支持图片 / PDF / 文本 / 音视频预览</div>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
