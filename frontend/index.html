<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>self-drive</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <h1>self-drive</h1>
          <p>一个适合 NAS 的轻量多用户网页网盘</p>
        </div>
        <div id="userBox" class="user-box hidden">
          <span id="currentUser"></span>
          <button id="logoutBtn" class="ghost">退出</button>
        </div>
      </header>

      <main class="layout">
        <section id="authCard" class="card auth-card">
          <div class="tabs">
            <button id="loginTab" class="tab active">登录</button>
            <button id="registerTab" class="tab">注册</button>
          </div>

          <form id="authForm" class="stack">
            <label id="nameField" class="hidden">
              <span>昵称</span>
              <input id="nameInput" name="name" placeholder="例如：小杨" />
            </label>
            <label>
              <span>邮箱</span>
              <input id="emailInput" name="email" type="email" required placeholder="name@example.com" />
            </label>
            <label>
              <span>密码</span>
              <input id="passwordInput" name="password" type="password" required placeholder="至少 6 位" />
            </label>
            <button id="submitBtn" type="submit">登录</button>
          </form>
          <p id="authMessage" class="hint"></p>
        </section>

        <section id="appCard" class="hidden app-grid">
          <div class="card sidebar">
            <div class="section-head compact-head">
              <h2>目录</h2>
              <button id="rootBtn" class="ghost">根目录</button>
            </div>
            <div id="breadcrumbBar" class="breadcrumb-bar"></div>

            <form id="folderForm" class="stack spaced-top">
              <label>
                <span>新建文件夹</span>
                <input id="folderNameInput" type="text" placeholder="例如：合同、图片、资料" />
              </label>
              <button type="submit">创建文件夹</button>
            </form>
            <p id="folderMessage" class="hint"></p>

            <form id="uploadForm" class="stack spaced-top">
              <label>
                <span>上传文件到当前目录</span>
                <input id="fileInput" type="file" name="files" multiple />
              </label>
              <button type="submit">上传</button>
            </form>
            <p id="uploadMessage" class="hint"></p>

            <div class="stats">
              <div>
                <span class="label">总文件数</span>
                <strong id="fileCount">0</strong>
              </div>
              <div>
                <span class="label">总占用</span>
                <strong id="totalSize">0 B</strong>
              </div>
              <div>
                <span class="label">我的配额</span>
                <strong id="quotaSize">0 MB</strong>
              </div>
            </div>
          </div>

          <div class="card content">
            <div class="section-head">
              <div>
                <h2>资源浏览器</h2>
                <p id="currentLocation" class="subtle">当前：根目录</p>
              </div>
              <div class="head-actions">
                <button id="upBtn" class="ghost">返回上级</button>
                <button id="refreshBtn" class="ghost">刷新</button>
              </div>
            </div>
            <div id="emptyState" class="empty">当前目录还是空的，先建个文件夹或者上传文件吧。</div>
            <table id="explorerTable" class="hidden">
              <thead>
                <tr>
                  <th>名称</th>
                  <th>类型</th>
                  <th>大小</th>
                  <th>时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="explorerTableBody"></tbody>
            </table>
          </div>

          <div class="right-stack">
            <div class="card preview">
              <div class="section-head">
                <h2>预览</h2>
                <span id="previewTitle" class="hint">未选择文件</span>
              </div>
              <div id="previewContainer" class="preview-container muted">支持图片 / PDF / 文本 / 音视频预览</div>
            </div>

            <div class="card shares">
              <div class="section-head">
                <h2>分享链接</h2>
                <button id="refreshSharesBtn" class="ghost">刷新</button>
              </div>
              <p id="shareMessage" class="hint"></p>
              <div id="sharesEmpty" class="empty">还没有分享链接，点某个文件的“分享”就能生成。</div>
              <div id="sharesList" class="share-list hidden"></div>
            </div>

            <div class="card account-card">
              <div class="section-head">
                <h2>账户设置</h2>
                <span id="accountRoleBadge" class="badge">user</span>
              </div>
              <div class="account-meta">
                <span id="accountEmailText"></span>
                <span id="accountStatusText"></span>
              </div>

              <form id="profileForm" class="stack spaced-top">
                <label>
                  <span>昵称</span>
                  <input id="accountNameInput" type="text" placeholder="输入新的昵称" />
                </label>
                <button type="submit">保存资料</button>
              </form>
              <p id="profileMessage" class="hint"></p>

              <form id="passwordForm" class="stack spaced-top">
                <label>
                  <span>当前密码</span>
                  <input id="currentPasswordInput" type="password" placeholder="输入当前密码" />
                </label>
                <label>
                  <span>新密码</span>
                  <input id="newPasswordInput" type="password" placeholder="至少 6 位" />
                </label>
                <button type="submit">修改密码</button>
              </form>
              <p id="passwordMessage" class="hint"></p>
            </div>

            <div id="adminCard" class="card hidden">
              <div class="section-head">
                <h2>管理员面板</h2>
                <button id="refreshAdminBtn" class="ghost">刷新</button>
              </div>
              <div id="adminEmpty" class="empty">你是管理员，这里会显示用户与存储概况。</div>
              <div id="adminList" class="admin-list hidden"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
